defaults:
  - ppo_trainer # this is a symbolic link to the verl/verl/trainer/config/ppo_trainer.yaml file
  - envs

system:
  CUDA_VISIBLE_DEVICES: "0"

seed:
  train: 10000
  val: 123

micro_batch_size_per_gpu: 4
ppo_mini_batch_size: 32
model_path: Qwen/Qwen2.5-3B-Instruct
enable_response_mask: True # Enabling response mask could improve stability of rollout/old_log_prob, as P(st|history) are no longer calculated in loss here. See https://docs.google.com/document/d/1bg7obeiKTExuHHBl5uOiSpec5uLDZ2Tgvxy6li5pHX4/edit?usp=sharing for more details.
grpo_advantage_length_weight: False # if you do not enable this and critic/advantage_estimator is GRPO, and the critic/advantages/mean is too low, then you can try enabling this to encourage reasoning and forbid collapse

lora:
  rank: 0
  alpha: 64
  target_modules: all-linear

actor_rollout_ref:
  model:
    path: ${model_path}
    lora_rank: ${lora.rank}
    lora_alpha: ${lora.alpha}
    target_modules: ${lora.target_modules}
  actor:
    ppo_mini_batch_size: ${ppo_mini_batch_size}  # by default, ppo_mini_batch_size = train_batch_size / 4
    ppo_micro_batch_size_per_gpu: ${micro_batch_size_per_gpu} # following micro_batch_size_per_gpu
    use_ref: True
    entropy_coeff: 0.001
    use_kl_loss: False
    kl_loss_coef: 0.000
    kl_loss_type: kl
    clip_ratio_low: 0.2
    clip_ratio_high: 0.28
    grpo_advantage_length_weight: ${grpo_advantage_length_weight}
    optim:
      betas: [0.9, 0.999]
      lr: 1e-6
  ref:
    log_prob_micro_batch_size_per_gpu: ${micro_batch_size_per_gpu} # following micro_batch_size_per_gpu
  rollout:
    name: vllm
    log_prob_micro_batch_size_per_gpu: ${micro_batch_size_per_gpu} # following micro_batch_size_per_gpu
    tensor_model_parallel_size: 1
    max_model_len: 3600
    prompt_length: 1 # useless. Just put it here
    response_length: 50 # single-turn response length
    gpu_memory_utilization: 0.5
    max_num_batched_tokens: 8192 # set only when enable_chunked_prefill is true
    temperature: 1
    rollout_filter_ratio: 0.25
    rollout_filter_type: largest # smallest or largest
    rollout_filter_metric: reward_variance
    enforce_eager: False #  for small models, set both enforce_eager and free_cache_engine to False to make rollout faster
    free_cache_engine: False
    val_kwargs:
      do_sample: True
      temperature: 0.5

critic:
  enable: False
  ppo_mini_batch_size: ${ppo_mini_batch_size} # by default, ppo_mini_batch_size = train_batch_size / 4
  ppo_micro_batch_size_per_gpu: ${micro_batch_size_per_gpu} # following micro_batch_size_per_gpu
  model:
    path: ${model_path}
    lora_rank: ${lora.rank}
    lora_alpha: ${lora.alpha}
    target_modules: ${lora.target_modules}
  optim:
    betas: [0.9, 0.999]
    lr: 1e-5

data:
  max_prompt_length: null
  max_response_length: null
  train_batch_size: null

algorithm:
  gamma: 1.0
  lam: 1.0
  high_level_gamma: 0.95
  adv_estimator: gae
  bi_level_gae: False
  use_label_outcome_advantage: True
  critic_score_weight: 1.0
  trajectory_reward_weight: 1.0
  label_weight: 1.0
  outcome_weight: 1.0
  kl_penalty: kl  # how to estimate kl divergence
  kl_ctrl:
    type: fixed
    kl_coef: 0.000

generative_critic:
  enable: False
  eval_enable: null
  backend: transformers # transformers | actor_rollout_vllm
  response_format: structured
  use_chat_template: True
  model_path: ${model_path}
  deepseek_model: deepseek-chat
  deepseek_api_key: null
  deepseek_api_base: https://api.deepseek.com
  deepseek_timeout: 60.0
  deepseek_max_retries: 3
  deepseek_max_concurrency: 8
  train_enable: False
  train_strategy: actor_ppo
  train_model_path: ${model_path}
  train_temperature: 1.0
  train_max_new_tokens: 256
  train_rollout_gpu_memory_utilization: 0.35
  train_rollout_max_model_len: 2048
  train_ppo_mini_batch_size: ${ppo_mini_batch_size}
  train_ppo_micro_batch_size_per_gpu: ${micro_batch_size_per_gpu}
  train_ppo_epochs: 1
  train_lr: 1e-6
  train_top_p: 1.0
  train_top_k: -1
  rlvr_format_reward: 0.2
  rlvr_label_reward: 1.0
  rlvr_label_penalty: -1.0
  rlvr_parse_fail_penalty: -1.0
  trust_remote_code: True
  do_sample: False
  temperature: 0.0
  top_p: 1.0
  top_k: -1
  max_new_tokens: 128
  inference_batch_size: 8
  default_label_if_parse_fail: False
  true_score: 1.0
  false_score: 0.0
  debug_print_samples: False
  debug_max_print: 2
  debug_max_prompt_chars: 1200
  debug_max_output_chars: 600

trainer:
  project_name: ragen_latest
  experiment_name: test
  local_log_dir: "results/"
  save_freq: 100
  total_training_steps: 200
  validation_steps: 1 # validation instances = validation_steps * val_env_groups * group_size
  val_before_train: True
  n_gpus_per_node: 1
  test_freq: 10
  generations_to_log_to_wandb: 
    val: 20
  logger: [ 'console', 'wandb' ]
  max_actor_ckpt_to_keep: 1
  max_critic_ckpt_to_keep: 1

agent_proxy:
  context_window_mode: "full" # "full" | "limited_multi_turn" | "single_turn"
  max_context_window: -1 # k value: -1 for full history, 1 for no history (like without_history)
  batch_adjust_mode: copy # "copy" to duplicate samples, "delete" to remove samples when batch size is not divisible
  max_turn: 5
  action_sep: "||"
  max_actions_per_turn: 2 # how many actions can be output at most in a single turn
  use_turn_scores: False # important to GAE when applying token-level rewards to token-level advantages. If False, will take the sum of scores as the reward for the last turn.
  debug_turn_boundary: False
  enable_think: True # False -> no think RL
  reward_normalization:
    grouping: "state" # state / batch / inductive
    method: "identity" # asym_clip / identity / mean_std

es_manager:
  format_penalty: -0.1
  train:
    env_groups: 8
    # under the same group, the env config and env seed are ensured to be equal
    group_size: 16
    env_configs:
      tags: ["CoordSokoban"]
      n_groups: [8] # If not set, all env names divide nums equally. Under the same group, the env config and env seed (prompt) are equal in each generation
  val:
    env_groups: 32
    group_size: 16 # should be set to 1 because when val temperature is set to 0 and group size > 1, there will be repetitive prompts which leads to same trajectory.
    env_configs:
      tags: ["CoordSokoban"]
      n_groups: [32] # TODO: If not set, all env names divide nums equally. Under the same group, the env config and env seed (prompt) are equal in each generation

ctx_manager:
  generation: # go to vllm
    gen_config:
      response_length: ${actor_rollout_ref.rollout.response_length}
      temperature: ${actor_rollout_ref.rollout.temperature}
      top_p: ${actor_rollout_ref.rollout.top_p}
      top_k: ${actor_rollout_ref.rollout.top_k}
      kwargs: null
